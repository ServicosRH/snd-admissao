<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SND — Admissão</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .hero{display:grid;place-items:center;min-height:70vh;text-align:center}
    .hero-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;box-shadow:0 12px 40px rgba(36,59,85,.10);max-width:900px}
    .hero img{max-width:100%;height:auto;border-radius:12px}
    .hero h1{color:var(--primary);margin:16px 0 8px}
    .hero p{color:var(--muted);margin:0 0 16px}
    .cta{display:inline-block;background:linear-gradient(90deg,var(--accent),#ff7a58);color:#fff;text-decoration:none;padding:12px 18px;border-radius:12px;font-weight:800}
    .link-sec{margin-top:10px;display:block}
  </style>
</head>
<body>
  <header class="container">
    <h1 style="display:none">Admissão SND</h1>
  </header>
  <main class="container">
    <section class="hero">
      <div class="hero-card">
        <img src="SND.png" alt="SND — Soluções em tecnologia"/>
        <h1>Bem-vindo ao cadastro de admissão</h1>
        <p>Leva poucos minutos. Separe seus documentos e clique para começar.</p>
        <a class="cta" href="cadastro.html">Iniciar cadastro</a>
        <a class="link-sec" href="envio-complementar.html">Enviar documentos restantes (Envio Complementar)</a>
      </div>
    </section>
  </main>
  <footer class="container"><small>© SND — RH</small></footer>
</body>
</html>
