<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Minha Área — SND</title>
  <link rel="stylesheet" href="style.css" />
  <style>.readonly span{display:block;padding:8px 12px;border:1px solid var(--border);border-radius:8px;background:var(--surface)}</style>
</head>
<body>
  <div class="shell">
    <main class="main-area">
      <header class="topbar panel-surface">
        <div>
          <span class="eyebrow">SND</span>
          <h2>Minha Área — Envio adicional</h2>
          <p>Informe seu e‑mail do cadastro para visualizar seus dados e enviar arquivos adicionais.</p>
        </div>
      </header>

      <section class="panel-surface" id="loginSection" style="padding:24px">
        <form id="loginForm" class="grid cols-2">
          <div class="field"><label>E‑mail*<input required type="email" name="email"/></label></div>
          <div class="field"><label>&nbsp;<button class="btn btn-primary" type="submit">Acessar</button></label></div>
          <output id="loginMsg" role="status" aria-live="polite"></output>
        </form>
      </section>

      <section class="panel-surface hidden" id="areaSection" style="padding:24px">
        <h3>Seus dados (resumo da Tela 1)</h3>
        <div class="grid cols-2 readonly" id="resumoTela1"></div>

        <h3 class="top-gap">Enviar novos documentos</h3>
        <p>Tipos aceitos: PDF, JPG, JPEG, PNG. Máx. 10 MB por arquivo.</p>
        <form id="uploadForm" class="grid">
          <input type="hidden" name="email"/>
          <div class="upload-card">
            <label for="up_extra"><span class="upload-icon">📎</span>Outros documentos (múltiplos)</label>
            <input id="up_extra" name="up_extra" type="file" accept=".pdf,.jpg,.jpeg,.png" multiple />
            <small class="file-meta">Múltiplos arquivos · até 10MB cada</small>
            <small class="file-feedback" aria-live="polite"></small>
          </div>
          <div>
            <button class="btn btn-primary" type="submit">Enviar arquivos</button>
            <a class="btn btn-ghost" href="index.html">Voltar ao cadastro</a>
          </div>
          <output id="uploadMsg" role="status" aria-live="polite"></output>
        </form>
      </section>
    </main>
  </div>
  <div class="toast" id="toast"></div>
  <script src="minha-area.js"></script>
</body>
</html>
