<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Envio Complementar — SND</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="container">
    <h1>Envio Complementar de Documentos — SND</h1>
    <p>Se você esqueceu algum documento, anexe aqui. Vamos vincular à sua pasta automaticamente.</p>
  </header>

  <main class="container">
    <form id="complementar-form">
      <fieldset>
        <legend>Identificação</legend>
        <div class="grid">
          <label>CPF* <input required name="cpf" type="text" inputmode="numeric" /></label>
          <label>Nome completo* <input required name="nomeCompleto" type="text" autocomplete="name"/></label>
          <label>E-mail <input name="email" type="email"/></label>
        </div>
      </fieldset>

      <fieldset>
        <legend>Anexos restantes</legend>
        <p>Você pode enviar vários arquivos de uma vez (PDF, DOC, DOCX, JPG, JPEG, PNG, até 10 MB cada).</p>
        <input type="file" id="anexos2" name="anexos2" multiple accept=".pdf,.doc,.docx,.jpg,.jpeg,.png"/>
      </fieldset>

      <div class="actions">
        <a class="btn-secondary" href="index.html">Voltar</a>
        <button type="submit" id="enviar-complementar" class="btn-primary">Enviar documentos</button>
      </div>
      <output id="resultado2" role="status" aria-live="polite"></output>
    </form>
  </main>

  <footer class="container"><small>© SND — RH</small></footer>
  <script src="envio-complementar.js"></script>
</body>
</html>
